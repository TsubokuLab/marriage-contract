<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe0ed"/>
      <stop offset="100%" stop-color="#fff5f7"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative soft circles -->
  <circle cx="-20" cy="-20" r="320" fill="#ffc8de" opacity="0.38"/>
  <circle cx="1220" cy="650" r="300" fill="#ffc8de" opacity="0.38"/>
  <circle cx="1160" cy="40" r="140" fill="#ffadd0" opacity="0.22"/>
  <circle cx="50" cy="590" r="120" fill="#ffadd0" opacity="0.22"/>
  <circle cx="600" cy="630" r="200" fill="#ffd6e3" opacity="0.18"/>

  <!-- White card -->
  <rect x="140" y="72" width="920" height="486" rx="32" fill="url(#cardGrad)"/>

  <!-- Pink top accent bar on card -->
  <rect x="140" y="72" width="920" height="7" rx="4" fill="#ff6b9d"/>

  <!-- Ring emoji -->
  <text
    x="600" y="252"
    text-anchor="middle"
    font-size="108"
    font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif"
  >💍</text>

  <!-- Title -->
  <text
    x="600" y="348"
    text-anchor="middle"
    font-size="54"
    font-weight="700"
    fill="#08131a"
    font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif"
    letter-spacing="6"
  >婚前契約書ジェネレーター</text>

  <!-- Description -->
  <text
    x="600" y="416"
    text-anchor="middle"
    font-size="26"
    fill="rgba(8,19,26,0.52)"
    font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif"
    letter-spacing="1"
  >質問に答えるだけで婚前契約書ドラフトを自動作成！</text>

  <!-- Decorative dot row -->
  <circle cx="552" cy="462" r="4.5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="572" cy="462" r="4.5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="592" cy="462" r="4.5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="612" cy="462" r="4.5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="632" cy="462" r="4.5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="652" cy="462" r="4.5" fill="#ff6b9d" opacity="0.7"/>
  <circle cx="672" cy="462" r="4.5" fill="#ff6b9d" opacity="0.7"/>

  <!-- URL -->
  <text
    x="600" y="517"
    text-anchor="middle"
    font-size="20"
    fill="#ff6b9d"
    font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif"
    opacity="0.85"
  >https://tsubokulab.github.io/marriage-contract</text>
</svg>
