<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe0ed"/>
      <stop offset="100%" stop-color="#fff5f7"/>
    </linearGradient>
    <!-- Title gradient: same as landing page linear-gradient(135deg, #ff6b9d, #ffb88c) -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ffb88c"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.78"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative soft circles -->
  <circle cx="-20" cy="-20" r="340" fill="#ffc8de" opacity="0.35"/>
  <circle cx="1220" cy="650" r="320" fill="#ffc8de" opacity="0.35"/>
  <circle cx="1170" cy="30" r="150" fill="#ffadd0" opacity="0.20"/>
  <circle cx="40" cy="600" r="130" fill="#ffadd0" opacity="0.20"/>

  <!-- White card (larger) -->
  <rect x="60" y="30" width="1080" height="570" rx="36" fill="url(#cardGrad)"/>

  <!-- Pink top accent bar -->
  <rect x="60" y="30" width="1080" height="9" rx="5" fill="#ff6b9d"/>

  <!-- 💍 Ring emoji -->
  <text
    x="600" y="192"
    text-anchor="middle"
    font-size="110"
    font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif"
  >💍</text>

  <!-- 婚前契約書 (dark, same as landing h1) -->
  <text
    x="600" y="294"
    text-anchor="middle"
    font-size="76"
    font-weight="700"
    fill="#08131a"
    font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif"
    letter-spacing="6"
  >婚前契約書</text>

  <!-- ジェネレーター (gradient, same as landing span) -->
  <text
    x="600" y="382"
    text-anchor="middle"
    font-size="76"
    font-weight="700"
    fill="url(#titleGrad)"
    font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif"
    letter-spacing="6"
  >ジェネレーター</text>

  <!-- Description -->
  <text
    x="600" y="468"
    text-anchor="middle"
    font-size="32"
    fill="rgba(8,19,26,0.62)"
    font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif"
  >質問に答えるだけで、お二人だけの婚前契約書ドラフトが作れます。</text>

  <!-- URL -->
  <text
    x="600" y="563"
    text-anchor="middle"
    font-size="26"
    fill="#ff6b9d"
    font-family="'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif"
    opacity="0.85"
  >https://tsubokulab.github.io/marriage-contract</text>
</svg>
